# PyRadiomics feature extractor configuration.
# IBSI-compliant, all seven 3D families enabled.
# Locked configuration — do not change without bumping a version tag.

imageType:
  Original: {}

featureClass:
  shape: []        # 14 features
  firstorder: []   # 18 features
  glcm: []         # 24 features
  glszm: []        # 16 features
  glrlm: []        # 16 features
  ngtdm: []        # 5 features
  gldm: []         # 14 features

setting:
  binWidth: 25
  label: 1
  interpolator: sitkBSpline
  resampledPixelSpacing: [0.5, 0.5, 3.0]
  voxelArrayShift: 0
  normalize: false
  geometryTolerance: 1e-6
